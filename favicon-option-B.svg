<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111B7A"/>
      <stop offset="100%" style="stop-color:#2235C8"/>
    </linearGradient>
    <linearGradient id="goldB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E070"/>
      <stop offset="50%" style="stop-color:#E8C468"/>
      <stop offset="100%" style="stop-color:#9A6C20"/>
    </linearGradient>
  </defs>

  <!-- Fundo gradiente azul -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bgB)"/>

  <!-- Faixa verde na base -->
  <path d="M0,420 L512,420 L512,512 Q512,512 410,512 L102,512 Q0,512 0,512 Z" fill="#3CAC3B"/>

  <!-- "2" em branco -->
  <text x="100" y="370" font-size="340" font-weight="900"
        font-family="'Arial Black', Impact, sans-serif"
        fill="white">2</text>

  <!-- "6" em branco -->
  <text x="246" y="370" font-size="340" font-weight="900"
        font-family="'Arial Black', Impact, sans-serif"
        fill="white">6</text>

  <!-- Taça dourada no centro -->
  <g transform="translate(256, 235)" fill="url(#goldB)">
    <path d="M-46,-95 C-46,-95 -54,44 -34,84 L-20,106 L20,106 L34,84 C54,44 46,-95 46,-95 Z"/>
    <path d="M-46,-95 C-82,-95 -88,8 -60,26 C-44,36 -30,30 -30,30" fill="none" stroke="url(#goldB)" stroke-width="15" stroke-linecap="round"/>
    <path d="M46,-95 C82,-95 88,8 60,26 C44,36 30,30 30,30" fill="none" stroke="url(#goldB)" stroke-width="15" stroke-linecap="round"/>
    <path d="M-30,-64 C-30,-64 -36,34 -20,68 L-10,86 L10,86 L20,68 C36,34 30,-64 30,-64 Z" fill="rgba(0,0,0,0.15)"/>
    <rect x="-14" y="106" width="28" height="12" rx="3"/>
    <rect x="-36" y="118" width="72" height="15" rx="5"/>
  </g>

  <!-- "26" na faixa verde -->
  <text x="256" y="476" font-size="44" font-weight="900"
        font-family="'Arial Black', Arial, sans-serif"
        fill="white" text-anchor="middle" letter-spacing="4">BOLÃO 2026</text>
</svg>
