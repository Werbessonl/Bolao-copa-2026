<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111B7A"/>
      <stop offset="100%" style="stop-color:#2235C8"/>
    </linearGradient>
    <linearGradient id="goldB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D060"/>
      <stop offset="50%" style="stop-color:#E8C468"/>
      <stop offset="100%" style="stop-color:#B8862C"/>
    </linearGradient>
    <radialGradient id="glowB" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,220,80,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,220,80,0)"/>
    </radialGradient>
  </defs>
  <!-- Fundo -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bgB)"/>
  <!-- Glow sutil -->
  <ellipse cx="256" cy="200" rx="220" ry="180" fill="url(#glowB)"/>

  <!-- Taça grande e impactante, centralizada -->
  <g transform="translate(256, 268)" fill="url(#goldB)">
    <!-- Corpo principal -->
    <path d="M-80,-80 C-80,-80 -92,50 -58,100 L-36,126 L36,126 L58,100 C92,50 80,-80 80,-80 Z"/>
    <!-- Alça esquerda -->
    <path d="M-80,-80 C-126,-80 -132,10 -100,38 C-80,52 -62,46 -62,46" fill="none" stroke="url(#goldB)" stroke-width="20" stroke-linecap="round"/>
    <!-- Alça direita -->
    <path d="M80,-80 C126,-80 132,10 100,38 C80,52 62,46 62,46" fill="none" stroke="url(#goldB)" stroke-width="20" stroke-linecap="round"/>
    <!-- Haste -->
    <rect x="-18" y="126" width="36" height="18" rx="4"/>
    <!-- Base larga -->
    <rect x="-52" y="144" width="104" height="20" rx="6"/>
  </g>

  <!-- Bola pequena no topo -->
  <g transform="translate(256, 138)">
    <circle cx="0" cy="0" r="36" fill="white" opacity="0.95"/>
    <polygon points="0,-16 14,6 -14,6" fill="#1A2494" opacity="0.7"/>
    <polygon points="15,-10 22,10 6,16" fill="#1A2494" opacity="0.55"/>
    <polygon points="-15,-10 -6,16 -22,10" fill="#1A2494" opacity="0.55"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>
  </g>

  <!-- Linha verde no rodapé — elegante -->
  <rect x="80" y="470" width="352" height="10" rx="5" fill="#3CAC3B"/>
</svg>
