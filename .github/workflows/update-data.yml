name: Atualizar Dados Copa 2026

on:
  schedule:
    - cron: '0 * * * *'   # A cada hora
  workflow_dispatch:        # Disparo manual pelo GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buscar dados da API
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          curl -sf -H "X-Auth-Token: $API_KEY" \
            "https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED" \
            -o matches_raw.json

          curl -sf -H "X-Auth-Token: $API_KEY" \
            "https://api.football-data.org/v4/competitions/WC/standings" \
            -o standings_raw.json

          python3 - <<'EOF'
import json, datetime

with open('matches_raw.json') as f:
    matches_data = json.load(f)
with open('standings_raw.json') as f:
    standings_data = json.load(f)

output = {
    "matches": matches_data.get("matches", []),
    "standings": standings_data.get("standings", []),
    "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
}

with open('data.json', 'w', encoding='utf-8') as f:
    json.dump(output, f, ensure_ascii=False, separators=(',', ':'))

print(f"OK: {len(output['matches'])} partidas, {len(output['standings'])} grupos")
EOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Sem alterações" || \
            (git commit -m "data: atualiza resultados Copa 2026" && git push)
