name: Atualizar Dados Copa 2026

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buscar dados da API
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          curl -sf -H "X-Auth-Token: $API_KEY" "https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED" -o matches_raw.json
          curl -sf -H "X-Auth-Token: $API_KEY" "https://api.football-data.org/v4/competitions/WC/standings" -o standings_raw.json
          jq -n --argjson m "$(cat matches_raw.json)" --argjson s "$(cat standings_raw.json)" '{matches:$m.matches,standings:[$s.standings[]|select(.table|length==4)],updated:(now|strftime("%Y-%m-%dT%H:%M:%SZ"))}' > data.json
          echo "OK: $(jq '.matches|length' data.json) partidas, $(jq '.standings|length' data.json) grupos"

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Sem alteracoes" || (git commit -m "data: atualiza resultados Copa 2026" && git push)
