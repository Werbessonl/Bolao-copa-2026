<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1460"/>
      <stop offset="100%" style="stop-color:#1A2494"/>
    </linearGradient>
    <linearGradient id="goldC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F2D660"/>
      <stop offset="100%" style="stop-color:#A87830"/>
    </linearGradient>
    <!-- Gradiente para o "2" e "6" em dourado -->
    <linearGradient id="numC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C468"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Fundo azul escuro -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bgC)"/>

  <!-- Círculo de brilho sutil ao centro -->
  <radialGradient id="glowC" cx="50%" cy="45%" r="40%">
    <stop offset="0%" style="stop-color:rgba(232,196,104,0.18)"/>
    <stop offset="100%" style="stop-color:rgba(232,196,104,0)"/>
  </radialGradient>
  <ellipse cx="256" cy="230" rx="200" ry="160" fill="url(#glowC)"/>

  <!-- "2" em DOURADO -->
  <text x="98" y="370" font-size="340" font-weight="900"
        font-family="'Arial Black', Impact, sans-serif"
        fill="url(#numC)">2</text>

  <!-- "6" em DOURADO -->
  <text x="244" y="370" font-size="340" font-weight="900"
        font-family="'Arial Black', Impact, sans-serif"
        fill="url(#numC)">6</text>

  <!-- Taça BRANCA centralizada -->
  <g transform="translate(256, 228)" fill="white">
    <path d="M-44,-90 C-44,-90 -52,40 -32,80 L-18,100 L18,100 L32,80 C52,40 44,-90 44,-90 Z"/>
    <path d="M-44,-90 C-78,-90 -82,4 -56,22 C-40,32 -28,26 -28,26" fill="none" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <path d="M44,-90 C78,-90 82,4 56,22 C40,32 28,26 28,26" fill="none" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <path d="M-26,-58 C-26,-58 -32,30 -18,62 L-8,80 L8,80 L18,62 C32,30 26,-58 26,-58 Z" fill="rgba(26,36,148,0.3)"/>
    <rect x="-12" y="100" width="24" height="12" rx="3"/>
    <rect x="-32" y="112" width="64" height="14" rx="5"/>
  </g>

  <!-- Linha verde separadora -->
  <rect x="60" y="404" width="392" height="5" rx="2.5" fill="#3CAC3B" opacity="0.8"/>

  <!-- Texto "BOLÃO" na base -->
  <text x="256" y="460" font-size="48" font-weight="900"
        font-family="'Arial Black', Arial, sans-serif"
        fill="white" text-anchor="middle" letter-spacing="8" opacity="0.9">BOLÃO</text>
</svg>
