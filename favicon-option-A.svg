<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111B7A"/>
      <stop offset="100%" style="stop-color:#2235C8"/>
    </linearGradient>
    <linearGradient id="goldA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C468"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- Fundo com border-radius 20% -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bgA)"/>

  <!-- Linhas de circuito sutis -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1.5" fill="none">
    <line x1="60" y1="120" x2="120" y2="120"/><line x1="120" y1="120" x2="120" y2="80"/>
    <line x1="392" y1="390" x2="450" y2="390"/><line x1="450" y1="390" x2="450" y2="430"/>
    <line x1="80" y1="380" x2="80" y2="440"/><line x1="80" y1="440" x2="140" y2="440"/>
    <line x1="430" y1="110" x2="430" y2="160"/><line x1="370" y1="110" x2="430" y2="110"/>
    <circle cx="120" cy="80" r="4" fill="rgba(255,255,255,0.15)" stroke="none"/>
    <circle cx="80" cy="440" r="4" fill="rgba(255,255,255,0.15)" stroke="none"/>
    <circle cx="450" cy="430" r="4" fill="rgba(255,255,255,0.15)" stroke="none"/>
    <circle cx="370" cy="110" r="4" fill="rgba(255,255,255,0.15)" stroke="none"/>
  </g>

  <!-- Bola de futebol estilizada (acima da taça) -->
  <g transform="translate(256, 148)">
    <circle cx="0" cy="0" r="52" fill="white" opacity="0.95"/>
    <polygon points="0,-24 20,8 -20,8" fill="#1A2494" opacity="0.7"/>
    <polygon points="22,-14 32,14 8,22" fill="#1A2494" opacity="0.6"/>
    <polygon points="-22,-14 -8,22 -32,14" fill="#1A2494" opacity="0.6"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
  </g>

  <!-- Taça dourada -->
  <g transform="translate(256, 290)" fill="url(#goldA)">
    <!-- Corpo da taça -->
    <path d="M-62,-30 C-62,-30 -70,30 -50,60 L-30,80 L30,80 L50,60 C70,30 62,-30 62,-30 Z"/>
    <!-- Alças -->
    <path d="M-62,-30 C-90,-30 -95,10 -75,25 C-60,35 -50,30 -50,30" fill="none" stroke="url(#goldA)" stroke-width="14" stroke-linecap="round"/>
    <path d="M62,-30 C90,-30 95,10 75,25 C60,35 50,30 50,30" fill="none" stroke="url(#goldA)" stroke-width="14" stroke-linecap="round"/>
    <!-- Base -->
    <rect x="-30" y="80" width="60" height="12" rx="3"/>
    <rect x="-42" y="92" width="84" height="14" rx="4"/>
  </g>

  <!-- 3 barras de ranking (base) -->
  <g transform="translate(256, 440)">
    <rect x="-70" y="-30" width="32" height="30" rx="5" fill="#3CAC3B" opacity="0.9"/>
    <rect x="-16" y="-50" width="32" height="50" rx="5" fill="#3CAC3B"/>
    <rect x="38" y="-70" width="32" height="70" rx="5" fill="#3CAC3B" opacity="0.9"/>
  </g>
</svg>
