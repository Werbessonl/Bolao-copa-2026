<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111B7A"/>
      <stop offset="100%" style="stop-color:#2235C8"/>
    </linearGradient>
    <linearGradient id="goldD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F2D660"/>
      <stop offset="100%" style="stop-color:#A87830"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(232,196,104,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(232,196,104,0)"/>
    </radialGradient>
  </defs>
  <!-- Fundo -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bgD)"/>

  <!-- Estrelas de fundo (decorativas, sutis) -->
  <g fill="rgba(255,255,255,0.12)" font-size="18" font-family="Arial">
    <text x="80" y="120">★</text>
    <text x="410" y="100">★</text>
    <text x="60" y="420">★</text>
    <text x="430" y="430">★</text>
    <text x="240" y="50">★</text>
  </g>

  <!-- Glow da taça -->
  <ellipse cx="256" cy="280" rx="130" ry="110" fill="url(#starGlow)"/>

  <!-- Taça grande centralizada -->
  <g transform="translate(256, 278)" fill="url(#goldD)">
    <!-- Corpo -->
    <path d="M-72,-90 C-72,-90 -84,48 -52,98 L-30,122 L30,122 L52,98 C84,48 72,-90 72,-90 Z"/>
    <!-- Detalhe interno -->
    <path d="M-50,-60 C-50,-60 -58,40 -36,80 L-16,100 L16,100 L36,80 C58,40 50,-60 50,-60 Z" fill="rgba(0,0,0,0.12)"/>
    <!-- Alças -->
    <path d="M-72,-90 C-116,-90 -122,14 -84,42 C-64,56 -46,50 -46,50" fill="none" stroke="url(#goldD)" stroke-width="18" stroke-linecap="round"/>
    <path d="M72,-90 C116,-90 122,14 84,42 C64,56 46,50 46,50" fill="none" stroke="url(#goldD)" stroke-width="18" stroke-linecap="round"/>
    <!-- Haste -->
    <rect x="-16" y="122" width="32" height="16" rx="3"/>
    <!-- Base -->
    <rect x="-50" y="138" width="100" height="18" rx="5"/>
  </g>

  <!-- Bola de futebol pequena no topo da taça -->
  <circle cx="256" cy="162" r="30" fill="white" opacity="0.95"/>
  <polygon points="256,146 268,162 244,162" fill="#1A2494" opacity="0.6"/>
  <circle cx="256" cy="162" r="30" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1.5"/>

  <!-- Faixa verde inferior -->
  <rect x="0" y="446" width="512" height="66" rx="0" ry="0" fill="#3CAC3B" opacity="0.9"/>
  <rect x="0" y="446" width="512" height="66" rx="0" ry="0" fill="none"/>
  <!-- Arredondamento inferior -->
  <rect x="0" y="446" width="512" height="66" fill="#3CAC3B" opacity="0"/>
  <path d="M0,446 L512,446 L512,512 Q512,512 410,512 L102,512 Q0,512 0,512 Z" fill="#3CAC3B" opacity="0.9"/>

  <!-- "26" na faixa verde -->
  <text x="256" y="493" font-size="42" font-weight="900" font-family="Arial Black, Arial" fill="white" text-anchor="middle" opacity="0.95">26</text>
</svg>
