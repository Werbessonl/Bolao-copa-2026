<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E070"/>
      <stop offset="50%" style="stop-color:#E8C468"/>
      <stop offset="100%" style="stop-color:#9A6C20"/>
    </linearGradient>
  </defs>

  <!-- Fundo preto (igual ao logo oficial) -->
  <rect width="512" height="512" rx="102" ry="102" fill="#0a0e1a"/>

  <!-- Mancha colorida no canto superior esquerdo — roxa -->
  <ellipse cx="80" cy="80" rx="140" ry="120" fill="#2235C8" opacity="0.7"/>

  <!-- Mancha verde no canto inferior direito -->
  <ellipse cx="430" cy="440" rx="130" ry="110" fill="#3CAC3B" opacity="0.6"/>

  <!-- "2" branco -->
  <text x="96" y="370" font-size="340" font-weight="900"
        font-family="'Arial Black', Impact, sans-serif"
        fill="white">2</text>

  <!-- "6" branco -->
  <text x="242" y="370" font-size="340" font-weight="900"
        font-family="'Arial Black', Impact, sans-serif"
        fill="white">6</text>

  <!-- Taça dourada centralizada -->
  <g transform="translate(256, 228)" fill="url(#goldD)">
    <path d="M-46,-95 C-46,-95 -56,44 -34,86 L-20,108 L20,108 L34,86 C56,44 46,-95 46,-95 Z"/>
    <path d="M-46,-95 C-84,-95 -90,8 -62,28 C-46,38 -32,32 -32,32" fill="none" stroke="url(#goldD)" stroke-width="15" stroke-linecap="round"/>
    <path d="M46,-95 C84,-95 90,8 62,28 C46,38 32,32 32,32" fill="none" stroke="url(#goldD)" stroke-width="15" stroke-linecap="round"/>
    <path d="M-30,-62 C-30,-62 -36,36 -20,68 L-10,88 L10,88 L20,68 C36,36 30,-62 30,-62 Z" fill="rgba(0,0,0,0.2)"/>
    <rect x="-14" y="108" width="28" height="13" rx="3"/>
    <rect x="-38" y="121" width="76" height="16" rx="6"/>
  </g>

  <!-- "BOLÃO" branco -->
  <text x="256" y="468" font-size="46" font-weight="900"
        font-family="'Arial Black', Arial, sans-serif"
        fill="white" text-anchor="middle" letter-spacing="7">BOLÃO</text>
</svg>
